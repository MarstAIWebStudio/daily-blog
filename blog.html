<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일상 공유 블로그</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .write-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input[type="file"] {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #f44336;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .posts-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .post:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .post-title {
            color: #333;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .post-date {
            color: #999;
            font-size: 0.9em;
        }

        .post-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .post-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .comments-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .comment {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .comment-content {
            flex: 1;
        }

        .comment-author {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .comment-text {
            color: #555;
            line-height: 1.5;
        }

        .comment-date {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .add-comment {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .add-comment input,
        .add-comment textarea {
            margin-bottom: 10px;
        }

        .add-comment button {
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2e7d32;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            .post-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 일상 공유</h1>
            <p>오늘의 이야기를 나누어보세요</p>
        </header>

        <div id="message"></div>

        <div class="write-section">
            <h2 style="margin-bottom: 20px; color: #333;">새 게시글 작성</h2>
            
            <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" placeholder="게시글 제목을 입력하세요">
            </div>

            <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" placeholder="오늘의 이야기를 작성하세요..."></textarea>
            </div>

            <div class="form-group">
                <label for="image">이미지 (선택)</label>
                <input type="file" id="image" accept="image/*">
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="createPost()">게시글 작성</button>
                <button class="btn-secondary" onclick="clearForm()">초기화</button>
            </div>
        </div>

        <div class="posts-section" id="postsContainer">
            <div class="loading">로딩 중...</div>
        </div>
    </div>

    <script>
        // API 설정 (C++ 서버 주소 - 필요시 수정)
        const API_BASE = 'http://localhost:3000/api';

        // 메시지 표시
        function showMessage(text, type = 'success') {
            const messageEl = document.getElementById('message');
            messageEl.innerHTML = `<div class="${type}">${text}</div>`;
            setTimeout(() => {
                messageEl.innerHTML = '';
            }, 3000);
        }

        // 게시글 생성
        async function createPost() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const imageInput = document.getElementById('image');

            if (!title || !content) {
                showMessage('제목과 내용을 입력해주세요', 'error');
                return;
            }

            try {
                let imageData = null;
                if (imageInput.files.length > 0) {
                    imageData = await fileToBase64(imageInput.files[0]);
                }

                const response = await fetch(`${API_BASE}/posts`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        title,
                        content,
                        image: imageData
                    })
                });

                if (!response.ok) throw new Error('게시글 작성 실패');

                showMessage('게시글이 작성되었습니다!', 'success');
                clearForm();
                loadPosts();
            } catch (error) {
                showMessage('오류: ' + error.message, 'error');
            }
        }

        // 파일을 Base64로 변환
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 게시글 삭제
        async function deletePost(postId) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                const response = await fetch(`${API_BASE}/posts/${postId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('삭제 실패');

                showMessage('게시글이 삭제되었습니다', 'success');
                loadPosts();
            } catch (error) {
                showMessage('오류: ' + error.message, 'error');
            }
        }

        // 댓글 추가
        async function addComment(postId) {
            const author = document.getElementById(`comment-author-${postId}`).value.trim();
            const text = document.getElementById(`comment-text-${postId}`).value.trim();

            if (!author || !text) {
                showMessage('작성자와 댓글을 입력해주세요', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/posts/${postId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        author,
                        text
                    })
                });

                if (!response.ok) throw new Error('댓글 작성 실패');

                showMessage('댓글이 작성되었습니다!', 'success');
                document.getElementById(`comment-author-${postId}`).value = '';
                document.getElementById(`comment-text-${postId}`).value = '';
                loadPosts();
            } catch (error) {
                showMessage('오류: ' + error.message, 'error');
            }
        }

        // 댓글 삭제
        async function deleteComment(postId, commentId) {
            if (!confirm('댓글을 삭제하시겠습니까?')) return;

            try {
                const response = await fetch(`${API_BASE}/posts/${postId}/comments/${commentId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('삭제 실패');

                showMessage('댓글이 삭제되었습니다', 'success');
                loadPosts();
            } catch (error) {
                showMessage('오류: ' + error.message, 'error');
            }
        }

        // 게시글 로드
        async function loadPosts() {
            try {
                const response = await fetch(`${API_BASE}/posts`);
                if (!response.ok) throw new Error('게시글 로드 실패');

                const posts = await response.json();
                renderPosts(posts);
            } catch (error) {
                document.getElementById('postsContainer').innerHTML = 
                    `<div class="error">오류: ${error.message}</div>`;
            }
        }

        // 게시글 렌더링
        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');

            if (posts.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>아직 게시글이 없습니다. 첫 번째 이야기를 작성해보세요!</p></div>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div>
                            <div class="post-title">${escapeHtml(post.title)}</div>
                            <div class="post-date">${formatDate(post.created_at)}</div>
                        </div>
                        <button class="btn-danger" onclick="deletePost(${post.id})">삭제</button>
                    </div>

                    ${post.image ? `<img src="${post.image}" alt="게시글 이미지" class="post-image">` : ''}

                    <div class="post-content">${escapeHtml(post.content)}</div>

                    <div class="comments-section">
                        <div class="comments-title">댓글 (${post.comments ? post.comments.length : 0})</div>

                        ${post.comments && post.comments.length > 0 ? 
                            post.comments.map(comment => `
                                <div class="comment">
                                    <div class="comment-content">
                                        <div class="comment-author">${escapeHtml(comment.author)}</div>
                                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                                        <div class="comment-date">${formatDate(comment.created_at)}</div>
                                    </div>
                                    <button class="btn-danger" onclick="deleteComment(${post.id}, ${comment.id})">삭제</button>
                                </div>
                            `).join('')
                            : '<p style="color: #999; margin: 10px 0;">댓글이 없습니다</p>'
                        }

                        <div class="add-comment">
                            <input type="text" id="comment-author-${post.id}" placeholder="이름" style="margin-bottom: 10px;">
                            <textarea id="comment-text-${post.id}" placeholder="댓글을 입력하세요..." style="margin-bottom: 10px;"></textarea>
                            <button class="btn-primary" onclick="addComment(${post.id})">댓글 작성</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 날짜 포맷팅
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ko-KR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // HTML 이스케이프
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 폼 초기화
        function clearForm() {
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('image').value = '';
        }

        // 페이지 로드 시 게시글 불러오기
        window.addEventListener('load', loadPosts);
    </script>
</body>
</html>
